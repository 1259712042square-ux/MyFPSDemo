; Plugin-provided defaults that get merged into the project's effective Game config
; very early in editor startup — before UAssetManager initializes. The engine reads
; these via the standard config hierarchy; user project values still override.
;
; The GameFeatureData entry below silences the "AssetManager settings do not include
; an entry for assets of type GameFeatureData" LoadErrors warning that fires when
; the GameFeatures plugin is enabled (which we depend on for our game_features
; tools). CookRule=AlwaysCook is what makes the rule non-default — it must be set
; for FPrimaryAssetRules::IsDefault() to return false in the engine's check.

[/Script/Engine.AssetManagerSettings]
+PrimaryAssetTypesToScan=(PrimaryAssetType="GameFeatureData",AssetBaseClass="/Script/GameFeatures.GameFeatureData",bHasBlueprintClasses=False,bIsEditorOnly=False,Directories=,SpecificAssets=,Rules=(Priority=-1,ChunkId=-1,bApplyRecursively=True,CookRule=AlwaysCook))
